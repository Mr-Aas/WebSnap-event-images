<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure CSS Cat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scene">

    <!-- Cat head -->
    <div class="head">

      <!-- Ears -->
      <div class="ear ear-left">
        <div class="ear-inner"></div>
      </div>
      <div class="ear ear-right">
        <div class="ear-inner"></div>
      </div>

      <!-- Eyes -->
      <div class="eye eye-left">
        <div class="pupil"></div>
      </div>
      <div class="eye eye-right">
        <div class="pupil"></div>
      </div>

      <!-- Nose -->
      <div class="nose"></div>

      <!-- Mouth -->
      <div class="mouth-left"></div>
      <div class="mouth-right"></div>

      <!-- Whiskers -->
      <div class="whisker whisker-left-top"></div>
      <div class="whisker whisker-left-bottom"></div>
      <div class="whisker whisker-right-top"></div>
      <div class="whisker whisker-right-bottom"></div>

      <!-- Cheeks -->
      <div class="cheek cheek-left"></div>
      <div class="cheek cheek-right"></div>

    </div>

    <!-- Body -->
    <div class="body">
      <!-- Paws -->
      <div class="paw paw-left"></div>
      <div class="paw paw-right"></div>
    </div>

    <!-- Tail -->
    <div class="tail"></div>

    
  </div>

</body>
</html>
