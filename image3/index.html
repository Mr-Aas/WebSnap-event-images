<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Flower</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scene">

    <!-- Flower -->
    <div class="flower">
      <!-- Petals -->
      <div class="petal petal-top"></div>
      <div class="petal petal-right"></div>
      <div class="petal petal-bottom"></div>
      <div class="petal petal-left"></div>
      <div class="petal petal-top-right"></div>
      <div class="petal petal-top-left"></div>
      <div class="petal petal-bottom-right"></div>
      <div class="petal petal-bottom-left"></div>
      <!-- Center -->
      <div class="center"></div>
    </div>

    <!-- Stem -->
    <div class="stem"></div>

    <!-- Leaves -->
    <div class="leaf leaf-left"></div>
    <div class="leaf leaf-right"></div>

    <!-- Pot -->
    <div class="pot">
      <div class="pot-rim"></div>
      <div class="pot-body"></div>
    </div>

  
  </div>

</body>
</html>
