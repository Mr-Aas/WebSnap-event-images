<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Sunset Landscape</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene">
    <!-- Sky -->
    <div class="sky"></div>

    <!-- Sun -->
    <div class="sun">
      <div class="sun-ray ray-1"></div>
      <div class="sun-ray ray-2"></div>
      <div class="sun-ray ray-3"></div>
      <div class="sun-ray ray-4"></div>
    </div>

    <!-- Clouds -->
    <div class="cloud cloud-1">
      <div class="innerclouds1"></div>
      <div class="innerclouds2"></div>
    </div>
    <div class="cloud cloud-2">
      <div class="innerclouds1"></div>
      <div class="innerclouds2"></div>
    </div>

    <!-- Mountains -->
    <div class="mountain mountain-back"></div>
    <div class="mountain mountain-front"></div>

    <!-- Water -->
    <div class="water">
      <div class="reflection"></div>
      <div class="ripple ripple-1"></div>
      <div class="ripple ripple-2"></div>
      <div class="ripple ripple-3"></div>
    </div>

    <!-- Trees -->
    <div class="tree tree-1">
      <div class="trunk"></div>
      <div class="foliage f1"></div>
      <div class="foliage f2"></div>
      <div class="foliage f3"></div>
    </div>
    <div class="tree tree-2">
      <div class="trunk"></div>
      <div class="foliage f1"></div>
      <div class="foliage f2"></div>
      <div class="foliage f3"></div>
    </div>

    <!-- Birds -->
    <div class="bird bird-1"></div>
    <div class="bird bird-2"></div>
    <div class="bird bird-3"></div>

    <!-- Ground -->
    <div class="ground"></div>
  </div>

</body>
</html>
