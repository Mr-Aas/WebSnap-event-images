<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Art - House</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scene">

    <!-- Sun -->
    <div class="sun"></div>

    <!-- House -->
    <div class="house">
      <div class="roof"></div>
      <div class="chimney"></div>
      <div class="wall">
        <div class="window left-window">
          <div class="pane"></div>
          <div class="pane"></div>
          <div class="pane"></div>
          <div class="pane"></div>
        </div>
        <div class="door">
          <div class="doorknob"></div>
        </div>
        <div class="window right-window">
          <div class="pane"></div>
          <div class="pane"></div>
          <div class="pane"></div>
          <div class="pane"></div>
        </div>
      </div>
    </div>

    <!-- Fence -->
    <div class="fence">
      <div class="post"></div>
      <div class="post"></div>
      <div class="post"></div>
      <div class="post"></div>
      <div class="post"></div>
      <div class="rail top-rail"></div>
      <div class="rail bottom-rail"></div>
    </div>

    <!-- Flowers -->
    <div class="flower flower-1">
      <div class="stem"></div>
      <div class="petal p1"></div>
      <div class="petal p2"></div>
      <div class="petal p3"></div>
      <div class="petal p4"></div>
      <div class="center"></div>
    </div>

    <div class="flower flower-2">
      <div class="stem"></div>
      <div class="petal p1"></div>
      <div class="petal p2"></div>
      <div class="petal p3"></div>
      <div class="petal p4"></div>
      <div class="center"></div>
    </div>

    <div class="flower flower-3">
      <div class="stem"></div>
      <div class="petal p1"></div>
      <div class="petal p2"></div>
      <div class="petal p3"></div>
      <div class="petal p4"></div>
      <div class="center"></div>
    </div>

    <!-- Ground -->
    <div class="ground"></div>

    <!-- Path -->
    <div class="path"></div>

  </div>


</body>
</html>
